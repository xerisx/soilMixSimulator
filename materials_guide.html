<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資材ガイド — 鉢充填シミュレータ</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/materials_guide.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M5JXTKJ163"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-M5JXTKJ163');
  </script>
  <!-- FOUC防止: テーマ即時適用 -->
  <script src="js/theme.js"></script>
</head>
<body class="guide-page">

  <header class="guide-header">
    <div class="guide-header-top">
      <a href="index.html" class="guide-back">← シミュレータに戻る</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="ダーク/ライト切り替え">
        <svg class="theme-icon theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon theme-icon-sun"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
    <div class="guide-header-inner">
      <h1 class="guide-title">資材ガイド</h1>
      <p class="guide-subtitle">各資材のパラメータと特性を一覧で確認できます</p>
    </div>
  </header>

  <!-- 検索・フィルタ・並び替え -->
  <div id="guide-toolbar">
    <input type="search" id="guide-search" placeholder="資材名で検索…" autocomplete="off">
    <div class="guide-filter-group">
      <button class="guide-filter-btn active" data-filter="all">すべて</button>
      <button class="guide-filter-btn" data-filter="organic">有機</button>
      <button class="guide-filter-btn" data-filter="inorganic">無機</button>
    </div>
    <select id="guide-sort">
      <option value="">並び替え: デフォルト</option>
      <option value="drainage">排水性 高い順</option>
      <option value="waterRetention">保水性 高い順</option>
      <option value="aeration">通気性 高い順</option>
      <option value="nutrientRetention">保肥力 高い順</option>
    </select>
    <span id="guide-count" class="guide-count"></span>
  </div>

  <main class="guide-main">
    <div id="card-grid" class="card-grid"></div>
    <p id="guide-empty" class="guide-empty" hidden>該当する資材が見つかりません</p>
  </main>

  <script src="js/materials.js"></script>
  <script src="js/materials_guide.js"></script>
</body>
</html>
