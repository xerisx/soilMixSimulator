<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Share Image Debug</title>
  <link rel="stylesheet" href="css/debug-share-image.css">
</head>
<body>

<div id="toolbar">
  <span class="title">Share Image Debug</span>
  <span class="sep">|</span>

  <select id="preset-select">
    <option value="balance">バランス</option>
    <option value="drainage">排水重視</option>
    <option value="water">保水重視</option>
    <option value="nutrient">保肥重視</option>
  </select>

  <button class="btn" id="redraw-btn">再描画</button>

  <label id="watch-label" class="active">
    <input type="checkbox" id="auto-watch" checked>
    自動更新
  </label>

  <span id="status">初期化中…</span>
</div>

<div id="preview-area">
  <img id="preview-img" src="" alt="share image preview">
  <p id="preview-placeholder">描画中...</p>
</div>

<!-- 必要最小限のスクリプト（simulation不要） -->
<script src="js/materials.js"></script>
<script src="js/commercial_soils.js"></script>
<script src="js/state.js"></script>
<script src="js/analysis.js"></script>
<script src="js/score-engine.js"></script>
<script src="js/share-image.js"></script>

<script>
  // share-image.js が内部で呼ぶ可能性のあるスタブ
  function showToast(msg) { setStatus(msg, false); }

  // ── 状態管理 ──
  const statusEl      = document.getElementById('status');
  const imgEl         = document.getElementById('preview-img');
  const placeholderEl = document.getElementById('preview-placeholder');
  const redrawBtn     = document.getElementById('redraw-btn');
  const presetSelect  = document.getElementById('preset-select');
  const watchCheck    = document.getElementById('auto-watch');
  const watchLabel    = document.getElementById('watch-label');

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.className   = isError ? 'error' : '';
  }

  // ── プリセットデータ適用 ──
  function applyPreset(key) {
    const preset = PRESETS[key] ?? PRESETS.balance;
    objectTypes.forEach(t => { t.weight = preset[t.id] ?? 0; });
  }

  // ── 描画 ──
  async function render() {
    redrawBtn.disabled    = true;
    redrawBtn.textContent = '描画中…';
    placeholderEl.hidden  = false;
    imgEl.src             = '';

    try {
      const canvas = await buildShareCanvas();
      const dataUrl = canvas.toDataURL('image/png');
      imgEl.src = dataUrl;
      placeholderEl.hidden = true;
      setStatus('更新: ' + new Date().toLocaleTimeString('ja-JP'));
    } catch (e) {
      const msg = e.message === 'no-mats' ? '配合データがありません' : 'エラー: ' + e.message;
      setStatus(msg, true);
      console.error('[debug-share] render error:', e);
    } finally {
      redrawBtn.disabled    = false;
      redrawBtn.textContent = '再描画';
    }
  }

  // ── share-image.js の変更監視 ──
  // HEAD リクエストで Last-Modified / ETag をポーリング。変更検知でリロード。
  let lastModifiedVal = null;
  let watchTimer = null;

  async function checkFileChange() {
    try {
      const res = await fetch('js/share-image.js?_=' + Date.now(), {
        method: 'HEAD',
        cache:  'no-store',
      });
      const sig = res.headers.get('last-modified') || res.headers.get('etag') || null;
      if (sig === null) {
        // ヘッダーが取れない環境（file://など）は監視を無効化
        setStatus('自動更新非対応（ローカルサーバーが必要）');
        stopWatch();
        return;
      }
      if (lastModifiedVal !== null && sig !== lastModifiedVal) {
        setStatus('変更を検知 → リロード中...');
        location.reload();
      }
      lastModifiedVal = sig;
    } catch (_) {}
  }

  function startWatch() {
    watchTimer = setInterval(checkFileChange, 1000);
    watchLabel.classList.add('active');
  }
  function stopWatch() {
    clearInterval(watchTimer);
    watchTimer = null;
    watchLabel.classList.remove('active');
    watchCheck.checked = false;
  }

  // ── イベント ──
  redrawBtn.addEventListener('click', render);

  presetSelect.addEventListener('change', () => {
    applyPreset(presetSelect.value);
    render();
  });

  watchCheck.addEventListener('change', () => {
    watchCheck.checked ? startWatch() : stopWatch();
  });

  // ── 初期化 ──
  applyPreset(presetSelect.value);
  render();
  startWatch();
</script>
</body>
</html>
