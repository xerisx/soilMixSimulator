      text-decoration: none;
      color: inherit;
    }
    .thanks-list a:hover {
      color: var(--blue);
    }
    .thanks-list li.x-item {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-right: 10px;
    }
    .x-icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      fill: currentColor;
      opacity: 0.5;
    }
    .thanks-list li.x-item a:hover .x-icon {
      opacity: 1;
    }

    .thanks-footer-note {
      margin-top: 40px;
      font-size: 12px;
      color: var(--text-4);
      line-height: 1.7;
