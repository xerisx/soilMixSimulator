<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉢充填シミュレータ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="fillRate"></div>

  <div id="controls">
    <span class="label">鉢のサイズ：</span>
    <button class="size-btn" data-size="1">1号</button>
    <button class="size-btn" data-size="2">2号</button>
    <button class="size-btn active" data-size="3">3号</button>
    <button class="size-btn" data-size="4">4号</button>
    <button class="size-btn" data-size="5">5号</button>
    <span class="separator"></span>
    <span class="label">物体サイズ：</span>
    <button class="obj-btn" data-obj="S">S</button>
    <button class="obj-btn active" data-obj="M">M</button>
    <button class="obj-btn" data-obj="L">L</button>
    <span class="separator"></span>
    <button id="startBtn">スタート</button>
    <button id="addBtn">追加</button>
    <button id="resetBtn">リセット</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
