<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉢充填シミュレータ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="fillRate"></div>

  <!-- 左パネル: メニュー -->
  <div id="panel">
    <header id="app-header">
      <div id="app-icon">🪴</div>
      <div id="app-title-group">
        <h1 id="app-title">鉢充填シミュレータ</h1>
        <p id="app-sub">用土の充填をシミュレート</p>
      </div>
    </header>

    <section id="sec-pot">
      <span class="ctrl-label">鉢のサイズ</span>
      <div class="btn-group">
        <button class="size-btn" data-size="1">1号</button>
        <button class="size-btn" data-size="2">2号</button>
        <button class="size-btn active" data-size="3">3号</button>
        <button class="size-btn" data-size="4">4号</button>
        <button class="size-btn" data-size="5">5号</button>
      </div>
    </section>

    <div id="obj-list"><!-- JS で描画 --></div>

    <section id="sec-actions">
      <button id="startBtn"  class="act-btn act-start">▶ スタート</button>
      <button id="addBtn"    class="act-btn act-add">＋ 追加</button>
      <button id="tontonBtn" class="act-btn act-tonton">トントン</button>
      <button id="resetBtn"  class="act-btn act-reset">リセット</button>
    </section>
  </div>

  <!-- 右パネル: グラフ -->
  <div id="right-panel">
    <header class="rp-header">
      <h2 class="rp-title">配合分析</h2>
    </header>

    <!-- 排水性 -->
    <div class="chart-block">
      <h3 class="chart-label">排水性</h3>
      <svg class="gauge-svg" viewBox="0 0 120 84">
        <path d="M 15 68 A 45 45 0 0 1 105 68"
              fill="none" stroke="#E5E7EB" stroke-width="11" stroke-linecap="round"/>
        <path id="gauge-drainage-fill" d="M 15 68 A 45 45 0 0 1 105 68"
              fill="none" stroke="#0284C7" stroke-width="11" stroke-linecap="round"
              stroke-dasharray="0 141.4"/>
        <text id="gauge-drainage-val" x="60" y="60" text-anchor="middle"
              font-family="sans-serif" font-size="16" fill="#111827" font-weight="700">--</text>
        <text x="13" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">低</text>
        <text x="107" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">高</text>
      </svg>
    </div>

    <!-- 保水性 -->
    <div class="chart-block">
      <h3 class="chart-label">保水性</h3>
      <svg class="gauge-svg" viewBox="0 0 120 84">
        <path d="M 15 68 A 45 45 0 0 1 105 68"
              fill="none" stroke="#E5E7EB" stroke-width="11" stroke-linecap="round"/>
        <path id="gauge-water-fill" d="M 15 68 A 45 45 0 0 1 105 68"
              fill="none" stroke="#16A34A" stroke-width="11" stroke-linecap="round"
              stroke-dasharray="0 141.4"/>
        <text id="gauge-water-val" x="60" y="60" text-anchor="middle"
              font-family="sans-serif" font-size="16" fill="#111827" font-weight="700">--</text>
        <text x="13" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">低</text>
        <text x="107" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">高</text>
      </svg>
    </div>

    <!-- 通気性 -->
    <div class="chart-block">
      <h3 class="chart-label">通気性</h3>
      <svg class="gauge-svg" viewBox="0 0 120 84">
        <path d="M 15 68 A 45 45 0 0 1 105 68"
              fill="none" stroke="#E5E7EB" stroke-width="11" stroke-linecap="round"/>
        <path id="gauge-aeration-fill" d="M 15 68 A 45 45 0 0 1 105 68"
              fill="none" stroke="#64748B" stroke-width="11" stroke-linecap="round"
              stroke-dasharray="0 141.4"/>
        <text id="gauge-aeration-val" x="60" y="60" text-anchor="middle"
              font-family="sans-serif" font-size="16" fill="#111827" font-weight="700">--</text>
        <text x="13" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">低</text>
        <text x="107" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">高</text>
      </svg>
    </div>

    <!-- 有機物率 / 無機物率 -->
    <div class="chart-block">
      <h3 class="chart-label">有機物率 / 無機物率</h3>
      <svg class="donut-svg" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="38" fill="none" stroke="#E5E7EB" stroke-width="20"/>
        <circle id="donut-organic-fill" cx="60" cy="60" r="38" fill="none"
                stroke="#16A34A" stroke-width="20"
                stroke-dasharray="0 238.8"
                transform="rotate(-90 60 60)"/>
        <circle id="donut-inorganic-fill" cx="60" cy="60" r="38" fill="none"
                stroke="#94A3B8" stroke-width="20"
                stroke-dasharray="238.8 238.8"
                transform="rotate(-90 60 60)"/>
        <text id="donut-center-val" x="60" y="63" text-anchor="middle"
              font-family="sans-serif" font-size="12" fill="#374151" font-weight="700">--%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item">
          <span class="legend-dot" style="background:#16A34A"></span>
          <span class="legend-text">有機物 <strong id="legend-organic-val">--%</strong></span>
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background:#94A3B8"></span>
          <span class="legend-text">無機物 <strong id="legend-inorganic-val">--%</strong></span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="materials.js"></script>
  <script src="main.js"></script>
</body>
</html>
