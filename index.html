<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉢充填シミュレータ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="fillRate"></div>

  <!-- 左パネル: メニュー -->
  <div id="panel">
    <header id="app-header">
      <div id="app-icon">🪴</div>
      <div id="app-title-group">
        <h1 id="app-title">鉢充填シミュレータ</h1>
        <p id="app-sub">用土の充填をシミュレート</p>
      </div>
    </header>

    <section id="sec-pot">
      <span class="ctrl-label">鉢のサイズ</span>
      <div class="btn-group">
        <button class="size-btn" data-size="1">1号</button>
        <button class="size-btn" data-size="2">2号</button>
        <button class="size-btn active" data-size="3">3号</button>
        <button class="size-btn" data-size="4">4号</button>
        <button class="size-btn" data-size="5">5号</button>
      </div>
    </section>

    <div id="obj-list"><!-- JS で描画 --></div>

    <section id="sec-actions">
      <button id="startBtn"  class="act-btn act-start">▶ スタート</button>
      <button id="addBtn"    class="act-btn act-add">＋ 追加</button>
      <button id="tontonBtn" class="act-btn act-tonton">トントン</button>
      <button id="resetBtn"  class="act-btn act-reset">リセット</button>
    </section>
  </div>

  <!-- 右パネル: グラフ -->
  <div id="right-panel">
    <header class="rp-header">
      <h2 class="rp-title">配合分析</h2>
    </header>

    <!-- 評価ラベル -->
    <div id="eval-block">
      <div id="eval-main">--</div>
      <div id="eval-sub">スライダーで配合を調整</div>
    </div>

    <!-- バーグラフ -->
    <div class="bars-block">
      <div class="bar-row">
        <span class="bar-icon">↓</span>
        <span class="bar-label">排水性</span>
        <div class="bar-track">
          <div class="bar-fill bar-drainage" id="bar-drainage"></div>
        </div>
        <span class="bar-pct" id="pct-drainage">--</span>
      </div>
      <div class="bar-row">
        <span class="bar-icon">●</span>
        <span class="bar-label">保水性</span>
        <div class="bar-track">
          <div class="bar-fill bar-water" id="bar-water"></div>
        </div>
        <span class="bar-pct" id="pct-water">--</span>
      </div>
      <div class="bar-row">
        <span class="bar-icon">〜</span>
        <span class="bar-label">通気性</span>
        <div class="bar-track">
          <div class="bar-fill bar-aeration" id="bar-aeration"></div>
        </div>
        <span class="bar-pct" id="pct-aeration">--</span>
      </div>
    </div>

    <!-- 有機物率 / 無機物率 -->
    <div class="chart-block organic-block">
      <h3 class="chart-label">有機物率 / 無機物率</h3>
      <div class="split-bar-wrap">
        <div class="split-bar-track">
          <div class="split-bar-organic" id="split-bar-organic"></div>
        </div>
        <div class="split-bar-ends">
          <span class="split-end-label" style="color:#16A34A">有機</span>
          <span class="split-end-label" style="color:#94A3B8">無機</span>
        </div>
      </div>
      <div class="split-bar-footer">
        <span id="split-label" class="split-label">--</span>
        <span id="split-vals" class="split-vals">--</span>
      </div>
    </div>

    <!-- フィードバック -->
    <div id="feedback-link">
      ご意見・ご要望は
      <a href="https://x.com/semi_Q_" target="_blank" rel="noopener noreferrer">@semi_Q_</a>
      まで
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="materials.js"></script>
  <script src="main.js"></script>
</body>
</html>
